<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schulkarte Bielefeld</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../shared/css/tachyons.min.css">
  <link rel="stylesheet" href="../shared/css/styles.css">
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet">
</head>

<body style="height:100dvh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;">

  <!-- ===================== TOP NAV ===================== -->
  <nav id="topNav">
    <div class="topnav-left">
      <a href="index.html" class="topnav-home">
        <span class="topnav-dot" id="topNavDot"></span>
        <span class="topnav-title" id="topNavTitle">Schulkarte</span>
      </a>
    </div>
    <div class="topnav-right">
      <a href="auswahl.html" class="topnav-btn">
        Auswahl
        <span class="topnav-badge" id="navBadge" style="display:none;">0</span>
      </a>
      <a href="schulinfo.html" class="topnav-btn">Schulinfo</a>
      <a href="ueber.html" class="topnav-btn">Über</a>
    </div>
  </nav>

  <!-- ===================== MAIN ROW ===================== -->
  <div class="flex relative flex-auto overflow-hidden">

    <!-- ===================== MAP AREA ===================== -->
    <div id="mapWrap" class="relative flex-auto">
      <div id="map" class="w-100 h-100"></div>

      <!-- BURGER (mobile only) -->
      <button id="burgerBtn"
        class="dn-l pointer fixed z-max flex items-center justify-center"
        onclick="toggleSidebar()"
        aria-label="Menü"
        style="top:12px;right:12px;width:40px;height:40px;border-radius:10px;
               border:1px solid var(--border);background:var(--sidebar-bg);
               box-shadow:0 2px 8px rgba(0,0,0,.13);">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"
             stroke="var(--text)" stroke-width="1.8" stroke-linecap="round">
          <line x1="2" y1="4.5"  x2="16" y2="4.5"/>
          <line x1="2" y1="9"    x2="16" y2="9"/>
          <line x1="2" y1="13.5" x2="16" y2="13.5"/>
        </svg>
      </button>

      <!-- ===== SCHOOL DETAIL OVERLAY ===== -->
      <div id="schoolOverlay"
        class="dn absolute z-max"
        style="left:10%;right:10%;top:10%;bottom:10%;
               background:var(--sidebar-bg);
               border:1px solid var(--border);
               border-radius:14px;
               box-shadow:0 8px 32px rgba(0,0,0,.15);
               overflow:hidden;">

        <!-- Header -->
        <div class="flex items-center justify-between pa3"
             style="border-bottom:1px solid var(--border);">
          <div class="flex items-center" style="gap:8px;min-width:0;flex:1;">
            <span id="overlayDot"
              style="display:inline-block;width:11px;height:11px;border-radius:50%;flex-shrink:0;"></span>
            <div style="min-width:0;">
              <div id="overlayName" class="f6 fw6 truncate" style="color:var(--text);"></div>
              <div id="overlayType" class="f7 mt0" style="color:var(--text-muted);margin-top:1px;"></div>
            </div>
          </div>
          <div class="flex items-center flex-shrink-0" style="gap:8px;">
            <button id="overlayBookmarkBtn" class="bookmark-btn"
                    onclick="overlayToggleBookmark()"></button>
            <button class="remove-btn" onclick="closeOverlay()"
                    aria-label="Schließen" style="font-size:1rem;line-height:1;">✕</button>
          </div>
        </div>

        <!-- Contact sub-header (address / phone / email / website) -->
        <div id="overlayContact" class="ph3 pv2 flex flex-wrap items-center"
             style="gap:6px 16px;border-bottom:1px solid var(--border);
                    background:var(--chip-bg);"></div>

        <!-- Scrollable body -->
        <div style="overflow-y:auto;max-height:calc(100% - 160px);">

          <!-- Stats grid (ID, Träger, Bezirk, Ortsteil + numbers) -->
          <div id="overlayGrid" class="pa3"
               style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>

          <!-- Eigenschaften tags -->
          <div id="overlayTags" class="ph3 pb3"></div>

          <!-- Notizen -->
          <div id="overlayNoteWrap" class="pa3" style="border-top:1px solid var(--border);">
            <div class="info-label">Notiz zur Merkliste</div>
            <textarea id="overlayNote"
              placeholder="Eigene Notizen zur Schule …"
              style="width:100%;min-height:80px;
                     border:1px solid var(--border);
                     border-radius:8px;
                     padding:8px;
                     font-size:12px;
                     background:var(--sidebar-bg);
                     color:var(--text);"></textarea>
          </div>

        </div>

      </div>

    </div><!-- /mapWrap -->

    <!-- ===================== SIDEBAR ===================== -->
    <aside id="sidebar"
      class="h-100 overflow-y-auto sidebar-desktop flex-none"
      style="background:var(--sidebar-bg);
             border-left:1px solid var(--border);padding:20px 18px;">

      <div class="divider" style="margin-top:0;"></div>

      <!-- SEARCH -->
      <div class="mb3">
        <div class="section-title">Suche</div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput"
                 placeholder="Schulname, Schultyp, Schulart …">
        </div>
        <div id="resultCount" class="mt1"></div>
      </div>

      <div class="divider"></div>

      <!-- MERKLISTE -->
      <div class="mb3">
        <div class="section-title">Merkliste</div>

        <button class="watchlist-filter-btn w-100" id="watchlistFilterBtn"
                onclick="toggleWatchlistFilter()">
          ★ Nur gemerkte Schulen
          <span class="watchlist-badge" id="watchlistBadge">0</span>
        </button>

        <!-- Aktionen -->
        <div class="mt2 flex" style="gap:8px;">
          <button id="exportWatchlistBtn" class="f7 pointer dim bn bg-transparent near-black pl0 pa1 outline-0 shadow-0">
            ⬇ Exportieren
          </button>

          <label class="f7 pointer dim bn bg-transparent near-black pa1 outline-0 shadow-0">
            ⬆ Importieren
            <input type="file" id="importWatchlistInput" accept="application/json" class="dn">
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <!-- EINZUGSGEBIETE — injected by JS only when ZONE_LAYERS is non-empty -->
      <div id="zoneAnchor"></div>

      <!-- SCHULTYP — chips generated by JS from canonical schulform list -->
      <div class="mb3">
        <div class="section-title flex items-center" style="gap:6px;">
          Schultyp
          <span id="mappingInfoBtn"
                style="cursor:pointer;font-size:12px;color:var(--text-muted);">ⓘ</span>
        </div>
        <div id="schoolFilters"></div>
      </div>

      <div class="divider"></div>

      <!-- TRÄGER — chips generated by JS from carrier config -->
      <div class="mb3">
        <div class="section-title">Träger</div>
        <div class="flex flex-wrap" style="gap:8px;" id="ownerFilters"></div>
      </div>

    </aside>

    <!-- Mobile backdrop -->
    <div id="sidebarBackdrop"
      class="dn fixed absolute--fill"
      style="z-index:400;background:rgba(0,0,0,.35);"
      onclick="toggleSidebar()"></div>

  </div><!-- /main row -->

  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="../shared/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schulkarte Berlin</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tachyons -->
  <link rel="stylesheet" href="https://unpkg.com/tachyons/css/tachyons.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    :root {
      --bg: #f0eeeb;
      --sidebar-bg: #faf9f7;
      --border: #e0ddd8;
      --text: #1a1816;
      --text-secondary: #6b6660;
      --text-muted: #a09c98;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --chip-bg: #eceae6;
      --chip-active: #1a1816;
      --chip-active-text: #faf9f7;

      /* School type colors */
      --color-grundschule: #2563eb;
      --color-gymnasium: #7c3aed;
      --color-iss: #059669;
      --color-foerderschule: #db2777;
      --color-berufsschule: #d97706;
      --color-privatschule: #0891b2;
      --color-andere: #71717a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    aside {
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
    }

    h1, h2, h3, h4 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .section-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    /* Search input */
    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 14px;
    }
    #searchInput {
      width: 100%;
      padding: 8px 10px 8px 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    #searchInput:focus {
      border-color: var(--accent);
    }
    #searchInput::placeholder {
      color: var(--text-muted);
    }

    /* Result count */
    #resultCount {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
    #resultCount span {
      color: var(--accent);
      font-weight: 500;
    }

    /* Year buttons */
    .year-btn {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: white;
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .year-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .year-btn.active {
      background: var(--chip-active);
      border-color: var(--chip-active);
      color: var(--chip-active-text);
    }

    /* Filter chips */
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-secondary);
      transition: background 0.12s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-chip:hover {
      background: var(--chip-bg);
    }
    .filter-chip input[type="checkbox"] {
      display: none;
    }
    .chip-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.3;
      transition: opacity 0.15s;
    }
    .filter-chip.checked .chip-dot {
      opacity: 1;
    }
    .filter-chip.checked {
      color: var(--text);
    }

    /* Carrier chips */
    .carrier-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      background: white;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .carrier-chip input { display: none; }
    .carrier-chip.checked {
      background: var(--chip-active);
      border-color: var(--chip-active);
      color: white;
    }

    /* Info panels */
    .info-panel {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.6;
      min-height: 60px;
      color: var(--text-secondary);
    }
    .info-panel .school-entry {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-panel .school-entry:last-child { border-bottom: none; }
    .info-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .info-val { color: var(--text); font-weight: 500; }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* Legend dots */
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Scrollbar */
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .year-row { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Watchlist toggle button */
    .bookmark-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.73rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .bookmark-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .bookmark-btn.saved {
      background: #fef3c7;
      border-color: #d97706;
      color: #92400e;
    }
    .bookmark-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    /* Watchlist filter toggle */
    .watchlist-filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }
    .watchlist-filter-btn.active {
      background: #fef3c7;
      border-color: #d97706;
      color: #92400e;
      font-weight: 500;
    }
    .watchlist-badge {
      margin-left: auto;
      background: #d97706;
      color: white;
      font-size: 0.65rem;
      font-weight: 600;
      border-radius: 99px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* Watchlist entries */
    .watchlist-entry {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .watchlist-entry:last-child { border-bottom: none; }
    .watchlist-entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .watchlist-note {
      width: 100%;
      font-size: 0.73rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      resize: none;
      outline: none;
      background: white;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    .watchlist-note:focus { border-color: var(--accent); }
    .watchlist-note::placeholder { color: var(--text-muted); font-style: italic; }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .remove-btn:hover { color: #dc2626; }
  </style>
</head>

<body class="flex sans-serif" style="background: var(--bg);">

  <!-- MAP -->
  <div style="width: 65%; height: 100vh; position: relative;">
    <div id="map" style="height: 100%; width: 100%;"></div>
  </div>

  <!-- SIDEBAR -->
  <aside style="width: 35%; height: 100vh; overflow-y: auto; padding: 20px 18px;">

    <!-- HEADER -->
    <div style="margin-bottom: 18px;">
      <h1 style="font-size: 1.15rem; margin: 0 0 2px 0; color: var(--text);">Schulkarte Berlin</h1>
      <div style="font-size: 0.72rem; color: var(--text-muted);">Filter & Analyse</div>
    </div>

    <div class="divider"></div>

    <!-- FREE TEXT SEARCH -->
    <div style="margin-bottom: 16px;">
      <div class="section-title">Suche</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Schulname, Schultyp, Schulart …">
      </div>
      <div id="resultCount"></div>
    </div>

    <div class="divider"></div>

    <!-- YEAR -->
    <div style="margin-bottom: 16px;">
      <div class="section-title">Schuljahr</div>
      <div class="year-row" id="yearFilter">
        <button class="year-btn" data-year="2022">22/23</button>
        <button class="year-btn" data-year="2023">23/24</button>
        <button class="year-btn" data-year="2024">24/25</button>
        <button class="year-btn active" data-year="2025">25/26</button>
        <button class="year-btn" data-year="2026">26/27</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- FILTERS -->
    <div style="margin-bottom: 16px;">
      <div class="section-title">Schultyp</div>
      <div id="schoolFilters">

        <label class="filter-chip checked">
          <input type="checkbox" value="Berufsschule" checked>
          <span class="chip-dot" style="background: var(--color-berufsschule);"></span>
          Berufsschule
        </label>

        <label class="filter-chip checked">
          <input type="checkbox" value="Grundschule" checked>
          <span class="chip-dot" style="background: var(--color-grundschule);"></span>
          Grundschule
        </label>

        <label class="filter-chip checked">
          <input type="checkbox" value="Integrierte Sekundarschule" checked>
          <span class="chip-dot" style="background: var(--color-iss);"></span>
          Integrierte Sekundarschule
        </label>

        <label class="filter-chip checked">
          <input type="checkbox" value="Privatschule" checked>
          <span class="chip-dot" style="background: var(--color-privatschule);"></span>
          Privatschule
        </label>

        <label class="filter-chip checked">
          <input type="checkbox" value="Schule mit sonderpädagogischen Förderschwerpunkt" checked>
          <span class="chip-dot" style="background: var(--color-foerderschule);"></span>
          Förderschule
        </label>

        <label class="filter-chip checked">
          <input type="checkbox" value="Gymnasium" checked>
          <span class="chip-dot" style="background: var(--color-gymnasium);"></span>
          Gymnasium
        </label>

        <label class="filter-chip checked">
          <input type="checkbox" value="Andere Schule" checked>
          <span class="chip-dot" style="background: var(--color-andere);"></span>
          Andere Schule
        </label>

      </div>
    </div>

    <div class="divider"></div>

    <!-- CARRIER -->
    <div style="margin-bottom: 16px;">
      <div class="section-title">Träger</div>
      <div style="display: flex; gap: 8px;" id="ownerFilters">
        <label class="carrier-chip checked">
          <input type="checkbox" value="öffentlich" checked> Öffentlich
        </label>
        <label class="carrier-chip checked">
          <input type="checkbox" value="privat" checked> Privat
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- WATCHLIST FILTER -->
    <div style="margin-bottom: 16px;">
      <div class="section-title">Merkliste</div>
      <button class="watchlist-filter-btn" id="watchlistFilterBtn" onclick="toggleWatchlistFilter()">
        ★ Nur gemerkte Schulen zeigen
        <span class="watchlist-badge" id="watchlistBadge">0</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- ZONE INFO -->
    <div style="margin-bottom: 14px;">
      <div class="section-title">Einzugsgebiet</div>
      <div class="info-panel" id="zoneInfo">
        <span style="color: var(--text-muted); font-style: italic;">Klicke auf ein Gebiet …</span>
      </div>
    </div>

    <!-- SCHOOL INFO -->
    <div style="margin-bottom: 14px;">
      <div class="section-title">Schule</div>
      <div class="info-panel" id="schoolInfo">
        <span style="color: var(--text-muted); font-style: italic;">Klicke auf eine Schule …</span>
      </div>
    </div>

    <!-- WATCHLIST PANEL -->
    <div>
      <div class="section-title">Gemerkte Schulen</div>
      <div class="info-panel" id="watchlistPanel">
        <span style="color: var(--text-muted); font-style: italic;">Noch keine Schulen gemerkt.</span>
      </div>
    </div>

  </aside>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <!-- App -->
  <script src="js/app.js"></script>

</body>
</html>
